<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Assinatura</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="box">
        <div class="topo">
            <img class="marca" src="img/Logo_SEM_Endosso.png" alt="Grupo Farias">
            <p class="nome_marca">GRUPO <strong>FARIAS</strong></p>
        </div>

        <h3>GERADOR DE ASSINATURA DE E-MAIL</h3>

        <form>
            <input type="text" id="nome" placeholder="Nome">
            <input type="text" id="cargo" placeholder="Cargo">
            <input type="text" id="departamento" placeholder="Departamento">

            <div style="display: flex; align-items: center; gap: 5px;">
                <input type="text" id="emailUsuario" placeholder="E-mail corporativo" style="margin-bottom: 15px;">
                <strong style="font-size: 15px; margin-bottom: 10px;">@grupofarias.com.br</strong>
            </div>

            <select id="unidade">
                <option value="">Selecione a sua unidade</option>
                <option value="UBF">UBF</option>
                <option value="UAN">UAN</option>
                <option value="UIT">UIT</option>
                <option value="UTP">UTP</option>
                <option value="USJ">USJ</option>
                <option value="UAV">UAV</option>
            </select>

            <input type="text" id="ramal" placeholder="Ramal (Opcional)">

            <label style="display: block; margin-bottom: 15px;">
                <input type="checkbox" id="mostrarTelefone" checked style="width: auto; margin: 0 5px 0 0;">
                Mostrar telefone da unidade
            </label>

            <button type="button" onclick="gerarAssinatura()">Gerar assinatura</button>
        </form>

        <p id="assinatura_name">Assinatura gerada:</p>
        <div id="assinatura"></div>

        <button type="button" onclick="copiarAssinatura()">Copiar assinatura</button>
        <p id="mensagem"></p>
    </div>

    <script>
        const unidades = {
            UBF: {
                empresa: "Vale Verde Empreendimentos Agrícolas Ltda.",
                endereco: "RN-062, km 09 - Baía Formosa/RN - CEP 59194-000",
                telefone: "+55 62 3413-7723"
            },
            UAN: {
                empresa: "Usina Anicuns Açúcar e Álcool S/A",
                endereco: "Rodovia GO-156, km 06, s/n – Zona Rural, Anicuns/GO - CEP 76170-000",
                telefone: "+55 62 3413-7700"
            },
            UIT: {
                empresa: "Vale Verde Empreendimentos Agrícolas Ltda.",
                endereco: "GO-336, km 16 – Itapaci/GO - CEP 76360-000",
                telefone: "+55 62 3413-7749"
            },
            UTP: {
                empresa: "Vale Verde Empreendimentos Agrícolas Ltda.",
                endereco: "GO-156, km 55 – Itapuranga/GO - CEP 76680-000",
                telefone: "+55 62 3413-7773"
            },
            USJ: {
                empresa: "Vale Verde Empreendimentos Agrícolas Ltda.",
                endereco: "Rod. Júlio Antônio Basso – Rio das Pedras/SP - CEP 13390-000",
                telefone: "+55 62 3413-7785"
            },
            UAV: {
                empresa: "Usina Álcool Verde",
                endereco: "Rodovia BR-317, km 59 – Capixaba/AC - CEP 69922-000",
                telefone: "+55 68 3224-1205"
            }
        };

        function gerarAssinatura() {
            const nome = document.getElementById("nome").value;
            const cargo = document.getElementById("cargo").value;
            const departamento = document.getElementById("departamento").value;
            const emailUsuario = document.getElementById("emailUsuario").value;
            const unidade = document.getElementById("unidade").value;
            const ramal = document.getElementById("ramal").value;
            const mostrarTelefone = document.getElementById("mostrarTelefone").checked;

            if (!emailUsuario || !unidade) {
                alert("Preencha o e-mail e selecione a unidade.");
                return;
            }

            const email = emailUsuario + "@grupofarias.com.br";
            const dados = unidades[unidade];

            const telefoneHTML = mostrarTelefone
                ? `📞 ${dados.telefone}${ramal ? " | Ramal " + ramal : ""}<br>`
                : "";

            document.getElementById("assinatura").innerHTML = `
  <table cellpadding="0" cellspacing="0" style="font-family:Arial, Helvetica, sans-serif; font-size:12px; color:#000;">
    <tr>
      <td style="padding-right:12px; vertical-align:middle;">
        <img src="img/Logo_Endosso.png" width="130" style="display:block;">
      </td>
      <td style="border-left:2px solid #d4af37; padding-left:12px;">
        <strong>${nome}</strong><br>
        ${cargo}<br>
        ${departamento}<br><br>

        ${telefoneHTML}
        ✉️ <a href="mailto:${email}" style="color:#000; text-decoration:none;">
          ${email}
        </a><br><br>

        <strong>${dados.empresa}</strong><br>
        📍 ${dados.endereco}<br>

        <span style="font-size:10px; font-style:italic; color:#555;">
          🌱 Preservar hoje é honrar as próximas gerações. Este e-mail não precisa ser impresso.
        </span>

        <div style="margin-top:8px; font-size:10px; color:#667; line-height:1.3;">
          <strong>Aviso de Confidencialidade e LGPD</strong><br>
          Esta mensagem e seus anexos podem conter informações confidenciais e/ou dados pessoais,
          protegidos pela Lei nº 13.709/2018 (Lei Geral de Proteção de Dados – LGPD).
          O uso, acesso, divulgação ou cópia não autorizados são proibidos.<br>
          Caso você não seja o destinatário desta mensagem, por favor, comunique o remetente
          e exclua este e-mail imediatamente.
        </div>
      </td>
    </tr>
  </table>
  `;

            document.getElementById("mensagem").innerText = "";
        }

        function copiarAssinatura() {
            const assinatura = document.getElementById("assinatura");

            if (!assinatura.innerHTML.trim()) {
                alert("Gere a assinatura primeiro.");
                return;
            }

            const range = document.createRange();
            range.selectNode(assinatura);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);

            document.execCommand("copy");
            window.getSelection().removeAllRanges();

            document.getElementById("mensagem").innerText =
                "Assinatura copiada! Agora é só colar no e-mail.";
        }
    </script>
</body>

</html>
